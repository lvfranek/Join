<section class="add-task">
    <div>
        <div class="top-container">
            <h1>Add Task</h1>
        </div>

        <div class="middle-container">
            <div class="left-elements">
                <div class="small-container-left">
                    <p class="input-headlines">Title<span class="redcross">*</span></p>
                    <input type="text" placeholder="Enter a title">
                </div>
                <div class="small-container-left">
                    <p class="input-headlines">Description</p>
                    <input type="text" placeholder="Enter a description" class="description">
                </div>
                <div class="small-container-left">
                    <p class="input-headlines">Due date<span class="redcross">*</span></p>
                    <div class="date-input-wrap">
                        <input type="text" placeholder="dd/mm/yyyy">
                        <img src="/icons/add-task/calendar.svg" alt="Calendar" class="date-input-icon">
                    </div>
                </div>
            </div>

            <div class="middleline"></div>

            <div class="right-elements">
                <div class="small-container-right">
                    <p class="input-headlines">Priority</p>
                    <div class="priority-buttons">
                        <button class="priority-button-urgent">
                            <span>Urgent</span>
                            <img src="./icons/add-task/high.svg" alt="high" class="high">
                            <img src="./icons/add-task/high-white.svg" alt="high-white" class="high-white">
                        </button>
                        <button class="priority-button-medium">
                            <span>Medium</span>
                            <img src="./icons/add-task/medium.svg" alt="medium" class="medium">
                            <img src="./icons/add-task/medium-white.svg" alt="medium-white" class="medium-white">
                        </button>
                        <button class="priority-button-low">
                            <span>Low</span>
                            <img src="./icons/add-task/low.svg" alt="low" class="low">
                            <img src="./icons/add-task/low-white.svg" alt="low-white" class="low-white">
                        </button>
                    </div>
                </div>
                <div class="small-container-right">
                    <p class="input-headlines">Assigned to</p>
                    <select type="text"></select>
                </div>
                <div class="small-container-right">
                    <p class="input-headlines">Category<span class="redcross">*</span></p>
                    <select type="text"></select>
                </div>
                <div class="small-container-right">
                    <p class="input-headlines">Subtasks</p>
                    <input type="text" placeholder="Add new subtask">
                    <span class="required-text required-text--mobile"><span class="redcross">*</span>This field is required</span>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-container">
        <div class="required-text-wrap">
            <span class="required-text"><span class="redcross">*</span>This field is required</span>
        </div>

        <div class="lower-buttons">
            <button class="clear-button">
                <span>Clear</span>
                <img src="./icons/add-task/Vector.svg" alt="cross icon" class="cross-basic">
                <img src="./icons/add-task/cross-lightblue.svg" alt="cross icon" class="cross-lightblue">
            </button>
            <button class="create-task-button">
                <span>Create Task</span>
                <img src="./icons/add-task/check.svg" alt="cross icon">
            </button>
        </div>

    </div>
</section>
