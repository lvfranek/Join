<section class="summary">
    <div class="top-container">
        <h1>Add Task</h1>
    </div>



    <div class="middle-container">
        <div class="left-elements">
            <div class="input-fields">
                <div>
                    <p class="input-headlines">Title<span class="redcross">*</span></p>
                    <input type="text" placeholder="Enter a title">
                </div>
                <div>
                    <p class="input-headlines">Description</p>
                    <input type="text" placeholder="Enter a description">
                </div>
                <div>
                    <p class="input-headlines">Due date</p>
                    <input type="text" placeholder="dd/mm/yyyy">
                </div>
            </div>
        </div>

        <div class="middleline"></div>

        <div class="right-elements">
            <p class="input-headlines">Priority</p>
            <div>
                <button>Urgent</button>
                <button>Medium</button>
                <button>Low</button>
            </div>
            <p class="input-headlines">Assigned to</p>
            <select type="text"></select>
            <p class="input-headlines">Category</p>
            <select type="text"></select>
            <p class="input-headlines">Subtasks</p>
            <input type="text" placeholder="Add new subtask">
        </div>
    </div>

    <div class="bottom-container"></div>
</section>
