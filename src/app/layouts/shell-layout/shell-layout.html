<div
  class="layout"
  [class.layout--expanded]="isSidebarExpanded()"
  [class.layout--collapsed]="isSidebarCollapsed()"
  [class.layout--hidden]="isSidebarHidden()"
  [class.layout--compact]="isCompact()"
>
  <app-sidebar
    [collapsed]="isSidebarCollapsed()"
    [hidden]="isSidebarHidden()"
    [compact]="isCompact()"
    (toggleMode)="toggleSidebar()"
    (requestClose)="closeSidebar()"
  />

  @if (isCompact() && !isSidebarHidden()) {
    <button
      class="layout__backdrop"
      type="button"
      (click)="closeSidebar()"
      aria-label="Close sidebar"
    ></button>
  }

  <div class="main">
    <app-header />

    <main class="content">
      <router-outlet />
    </main>

    @if (isCompact() && isSidebarHidden()) {
      <nav tuiTabBar class="bottom-nav" [activeItemIndex]="activeBottomNavIndex()">
        @for (item of bottomNavItems; track item.path; let index = $index) {
          <button
            tuiTabBarItem
            class="bottom-nav__item"
            [class.bottom-nav__item--active]="activeBottomNavIndex() === index"
            type="button"
            (click)="router.navigate([item.path])"
          >
            <img
              class="bottom-nav__icon"
              [src]="item.iconPath"
              [alt]="''"
              width="30"
              height="30"
              aria-hidden="true"
            />
            <span class="bottom-nav__label">{{ item.label }}</span>
          </button>
        }
      </nav>
    }
  </div>
</div>
