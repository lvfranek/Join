<div
  class="layout"
  [class.layout--expanded]="isSidebarExpanded()"
  [class.layout--collapsed]="isSidebarCollapsed()"
  [class.layout--hidden]="isSidebarHidden()"
  [class.layout--compact]="isCompact()"
>
  <app-sidebar
    [collapsed]="isSidebarCollapsed()"
    [hidden]="isSidebarHidden()"
    [compact]="isCompact()"
    [publicMode]="!isAuthenticated()"
    (toggleMode)="toggleSidebar()"
    (requestClose)="closeSidebar()"
  />

  @if (isCompact() && !isSidebarHidden()) {
    <button
      class="layout__backdrop"
      type="button"
      (click)="closeSidebar()"
      aria-label="Close sidebar"
    ></button>
  }

  <div class="main">
    <app-header />

    <main
      class="content"
      [class.content--summary]="isSummaryView()"
      [class.content--flush]="isContactsView()"
      [class.content--full]="isBoardView()"
      [class.content--light-scrollbar]="isPublicTextView()"
    >
      <router-outlet />
    </main>

    @if (isCompact() && isSidebarHidden() && isAuthenticated()) {
      <nav class="bottom-nav">
        @for (item of bottomNavItems; track item.path) {
          <button
            class="bottom-nav__item"
            [class.bottom-nav__item--active]="isBottomNavActive(item.path)"
            type="button"
            (click)="router.navigate([item.path])"
          >
            <img
              class="bottom-nav__icon"
              [class.bottom-nav__icon--active]="isBottomNavActive(item.path)"
              [src]="item.iconPath"
              [alt]="''"
              width="30"
              height="30"
              aria-hidden="true"
            />
            <span
              class="bottom-nav__label"
              [class.bottom-nav__label--active]="isBottomNavActive(item.path)"
            >
              {{ item.label }}
            </span>
          </button>
        }
      </nav>
    }
  </div>
</div>
