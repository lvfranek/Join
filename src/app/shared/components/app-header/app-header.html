<header class="app-header">
  <div class="app-header__left">
    <p class="app-header__title">Kanban Project Management Tool</p>
  </div>

  <div class="app-header__actions">
    <button class="app-header__help" type="button" routerLink="/help-site" aria-label="Open help">
      <span class="app-header__help-icon" aria-hidden="true"></span>
    </button>

    <div class="app-header__profile">
      <button
        #profileButton
        class="app-header__avatar"
        type="button"
        aria-label="Open profile menu"
        [attr.aria-expanded]="isProfileMenuOpen ? 'true' : 'false'"
        aria-controls="profile-menu"
        (click)="toggleProfileMenu($event)"
      >
        SM
      </button>

      <nav
        id="profile-menu"
        class="app-header__profile-menu"
        [class.app-header__profile-menu--open]="isProfileMenuOpen"
        aria-label="Profile menu"
        [attr.inert]="isProfileMenuOpen ? null : ''"
        (click)="keepProfileMenuOpen($event)"
      >
        <a
          class="app-header__profile-menu-item"
          routerLink="/legal-notice"
          (click)="closeProfileMenu()"
        >
          Legal Notice
        </a>
        <a
          class="app-header__profile-menu-item"
          routerLink="/privacy-policy"
          (click)="closeProfileMenu()"
        >
          Privacy Policy
        </a>
        <button class="app-header__profile-menu-item" type="button" (click)="logout()">
          Log out
        </button>
      </nav>
    </div>
  </div>
</header>
