<aside class="sidebar">
  <app-brand></app-brand>

  <nav class="nav" aria-label="Main navigation">
    @for (item of navItems; track item.path) {
      <a class="nav-item" [routerLink]="item.path" routerLinkActive="nav-item--active">
        <img class="nav-item__icon" [src]="item.icon" alt="" aria-hidden="true" />
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <nav class="legal-nav" aria-label="Legal navigation">
    <a class="legal-link" routerLink="/privacy-policy" routerLinkActive="legal-link--active">
      Privacy Policy
    </a>
    <a class="legal-link" routerLink="/legal-notice" routerLinkActive="legal-link--active">
      Legal notice
    </a>
  </nav>
</aside>
